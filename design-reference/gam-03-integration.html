<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>GAM · Sviluppo & System Integration</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#fff;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:32px;
     font-family:'Poppins',system-ui,sans-serif}
.graphic{width:100%;max-width:620px}
.graphic svg{width:100%;height:auto;display:block}
.core{fill:#4D93A2}
.halo{fill:none;stroke:#4D93A2;opacity:.32;animation:halo 3.2s ease-out infinite}
@keyframes halo{0%{transform:scale(.76);opacity:.42}100%{transform:scale(1.45);opacity:0}}
.g{fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.gf{fill:#fff}
.link{fill:none;stroke:#DDE6E8;stroke-width:1.8}
.link-on{fill:none;stroke:#BFD9DE;stroke-width:2}
.dot{fill:#4D93A2}
.chip{fill:#fff;stroke:#4D93A2;stroke-width:1.6}
.chip-l{fill:#fff;stroke:#C6D2D8;stroke-width:1.6}
.ring{fill:none;stroke:#DDE6E8;stroke-width:1.8}
.arc{fill:none;stroke:#BFD9DE;stroke-width:2;stroke-linecap:round}
.mono{font-family:'Poppins',sans-serif;font-size:11px;font-weight:600;letter-spacing:2px;fill:#8CA0AE}
.lbl{font-size:13px;font-weight:500;fill:#1E333B}
.tealtxt{fill:#35707E}
.bar{fill:#4D93A2}
.bar-l{fill:#BFD9DE}
@media(prefers-reduced-motion:reduce){.dot,.halo,.spin{display:none;animation:none}}
</style>
</head>
<body>
  <div class="graphic">
    <svg viewBox="0 0 600 340" xmlns="http://www.w3.org/2000/svg" role="img"
         aria-label="Sistemi separati che diventano un ecosistema unico e connesso">
      <path class="link" id="t1" d="M118,84 C176,84 196,170 226,170"/>
      <path class="link" id="t2" d="M104,170 C170,170 200,170 226,170"/>
      <path class="link" id="t3" d="M118,256 C176,256 196,170 226,170"/>
      <g class="chip-l">
        <rect x="40" y="62" width="78" height="44" rx="10" transform="rotate(-8 79 84)"/>
        <rect x="26" y="148" width="78" height="44" rx="10" transform="rotate(5 65 170)"/>
        <rect x="40" y="234" width="78" height="44" rx="10" transform="rotate(-5 79 256)"/>
      </g>
      <g stroke="#C6D2D8" stroke-width="1.6" fill="none" stroke-linecap="round">
        <path d="M62,80 h30 M62,90 h18" transform="rotate(-8 79 84)"/>
        <path d="M48,166 h30 M48,176 h18" transform="rotate(5 65 170)"/>
        <path d="M62,252 h30 M62,262 h18" transform="rotate(-5 79 256)"/>
      </g>

      <path class="link-on" id="t4" d="M314,170 C344,170 350,170 378,170"/>

      <rect x="378" y="82" width="192" height="176" rx="16" fill="#fff" stroke="#4D93A2" stroke-width="1.8"/>
      <g stroke="#BFD9DE" stroke-width="1.8" fill="none">
        <path d="M426,130 H522 M426,210 H522 M426,130 V210 M522,130 V210 M474,130 V210 M426,170 H522"/>
      </g>
      <g>
        <rect x="406" y="110" width="40" height="40" rx="9" fill="#4D93A2"/>
        <rect x="502" y="110" width="40" height="40" rx="9" fill="#4D93A2" opacity=".68"/>
        <rect x="406" y="190" width="40" height="40" rx="9" fill="#4D93A2" opacity=".68"/>
        <rect x="502" y="190" width="40" height="40" rx="9" fill="#4D93A2"/>
      </g>
      <circle cx="474" cy="170" r="9" fill="#35707E"/>

      <circle class="halo" cx="270" cy="170" r="44" style="transform-origin:270px 170px"/>
      <circle class="core" cx="270" cy="170" r="44"/>
      <g class="g">
        <path d="M256,156 L244,170 L256,184"/>
        <path d="M284,156 L296,170 L284,184"/>
        <path d="M276,152 L264,188"/>
      </g>

      <circle class="dot" r="4"><animateMotion dur="2.3s" begin="-0.2s" repeatCount="indefinite"><mpath href="#t1"/></animateMotion></circle>
      <circle class="dot" r="4"><animateMotion dur="2.3s" begin="-1s" repeatCount="indefinite"><mpath href="#t2"/></animateMotion></circle>
      <circle class="dot" r="4"><animateMotion dur="2.3s" begin="-1.8s" repeatCount="indefinite"><mpath href="#t3"/></animateMotion></circle>
      <circle class="dot" r="4"><animateMotion dur="2.3s" begin="-0.6s" repeatCount="indefinite"><mpath href="#t4"/></animateMotion></circle>
    </svg>
  </div>
</body>
</html>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#fff;font-family:'Poppins',system-ui,sans-serif;
     display:flex;align-items:center;justify-content:center;min-height:100vh;padding:28px}
.graphic{width:100%;max-width:1040px}
.graphic svg{width:100%;height:auto;display:block}
.stage-l{font-size:17px;font-weight:600;fill:#1E333B;letter-spacing:-.01em}
.stage-s{font-size:13px;font-weight:400;fill:#7A8B9B}
.kicker{font-size:12px;font-weight:600;fill:#9DAEBB;letter-spacing:3px}
.chip-t{font-size:14px;font-weight:500;fill:#35707E}
.num{font-size:12px;font-weight:700;fill:#fff}
.g{fill:none;stroke:#fff;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
.gt{fill:none;stroke:#35707E;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.flow{fill:none;stroke:#DDE6E8;stroke-width:2}
.flow-d{fill:none;stroke:#BFD9DE;stroke-width:2;stroke-dasharray:2 7;stroke-linecap:round}
.dot{fill:#4D93A2}
.halo{fill:none;stroke:#4D93A2;opacity:.3;animation:halo 3.4s ease-out infinite}
@keyframes halo{0%{transform:scale(.8);opacity:.4}100%{transform:scale(1.4);opacity:0}}
.rise{animation:rise 2.6s ease-in-out infinite alternate;transform-origin:bottom}
@keyframes rise{from{transform:scaleY(.86)}to{transform:scaleY(1)}}
@media(prefers-reduced-motion:reduce){.dot,.halo{display:none}.rise{animation:none}}
</style>
</head>
